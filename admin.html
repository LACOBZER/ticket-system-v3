<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Dashboard</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 30px;
    }

    .wrapper{
      max-width: 1000px;
      margin: auto;
    }

    h1{
      margin-bottom: 20px;
    }

    button{
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .logout{
      background: #dc3545;
    }

    .filters{
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .filter-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .ticket{
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input, textarea, select{
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea{
      resize: none;
    }

    .status-open{
      color: red;
      font-weight: bold;
    }

    .status-progress{
      color: orange;
      font-weight: bold;
    }

    .status-closed{
      color: green;
      font-weight: bold;
    }

    .priority-low{
      color: green;
      font-weight: bold;
    }

    .priority-medium{
      color: #c9a000;
      font-weight: bold;
    }

    .priority-high{
      color: red;
      font-weight: bold;
    }

    .stats{
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .history{
      margin-top: 15px;
    }

    .note{
      background: #f4f6f9;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    img{
      max-width: 400px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<script>
if(!localStorage.getItem("role")){
  window.location.href = "index.html";
}
</script>

<div class="wrapper">

  <h1>Support Dashboard</h1>

  <button onclick="window.location.href='index.html'">← Zurück</button>
  <button onclick="loadTickets()">Aktualisieren</button>
  <button class="logout" onclick="logout()">Logout</button>

  <div class="filters">
    <b>Suche und Filter</b>

    <div class="filter-grid">
      <div>
        <label for="searchInput">Suchfeld</label>
        <input
          type="text"
          id="searchInput"
          placeholder="Nach Ticketnummer, Benutzer, Kunde, Anliegen oder Details suchen"
          oninput="loadTickets()"
        >
      </div>

      <div>
        <label for="statusFilter">Status</label>
        <select id="statusFilter" onchange="loadTickets()">
          <option value="all">Alle</option>
          <option value="open">Offen</option>
          <option value="in_progress">In Bearbeitung</option>
          <option value="closed">Erledigt</option>
        </select>
      </div>

      <div>
        <label for="priorityFilter">Priorität</label>
        <select id="priorityFilter" onchange="loadTickets()">
          <option value="all">Alle</option>
          <option value="low">Niedrig</option>
          <option value="medium">Mittel</option>
          <option value="high">Dringend</option>
        </select>
      </div>
    </div>
  </div>

  <div class="stats">
    <b>Ticket Statistik</b><br><br>
    Offen: <span id="open"></span><br>
    In Bearbeitung: <span id="progress"></span><br>
    Erledigt: <span id="closed"></span>
  </div>

  <div id="tickets"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://epszdsxexzxpgsrexxqy.supabase.co";
const SUPABASE_KEY = "sb_publishable_sB6ZPrGeVXk7zSbc3vRdBg_WxmZkNEU";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTickets(){

  const { data, error } = await supabaseClient
    .from("tickets")
    .select("*")
    .order("id", { ascending: false });

  if(error){
    document.getElementById("tickets").innerHTML =
      "<div style='color:red;'>Fehler: " + error.message + "</div>";
    return;
  }

  const tickets = data || [];
  const statusFilter = document.getElementById("statusFilter").value;
  const priorityFilter = document.getElementById("priorityFilter").value;
  const searchText = document.getElementById("searchInput").value.trim().toLowerCase();

  let open = 0;
  let progress = 0;
  let closed = 0;

  tickets.forEach(t => {
    if(t.status === "open") open++;
    if(t.status === "in_progress") progress++;
    if(t.status === "closed") closed++;
  });

  document.getElementById("open").innerText = open;
  document.getElementById("progress").innerText = progress;
  document.getElementById("closed").innerText = closed;

  let html = "";

  tickets.forEach(t => {

    if(statusFilter !== "all" && t.status !== statusFilter) return;
    if(priorityFilter !== "all" && t.priority !== priorityFilter) return;

    const searchTarget = [
      t.number || "",
      t.participant || "",
      t.customer || "",
      t.subject || "",
      t.description || ""
    ].join(" ").toLowerCase();

    if(searchText && !searchTarget.includes(searchText)) return;

    let statusText = "";
    let statusClass = "";

    if(t.status === "open"){
      statusText = "Offen";
      statusClass = "status-open";
    } else if(t.status === "in_progress"){
      statusText = "In Bearbeitung";
      statusClass = "status-progress";
    } else if(t.status === "closed"){
      statusText = "Erledigt";
      statusClass = "status-closed";
    }

    let priorityText = "-";
    let priorityClass = "";

    if(t.priority === "low"){
      priorityText = "Niedrig";
      priorityClass = "priority-low";
    } else if(t.priority === "medium"){
      priorityText = "Mittel";
      priorityClass = "priority-medium";
    } else if(t.priority === "high"){
      priorityText = "Dringend";
      priorityClass = "priority-high";
    }

    html += `
      <div class="ticket">

        <h3>${t.number || "-"} — ${t.subject || "-"}</h3>

        <b>Benutzer:</b> ${t.participant || "-"}<br>
        <b>Kunde:</b> ${t.customer || "-"}<br>
        <b>Priorität:</b> <span class="${priorityClass}">${priorityText}</span><br><br>

        <b>Details:</b><br>
        ${t.description || "-"}

        ${t.screenshot ? `
          <br><br>
          <b>Screenshot:</b><br>
          <img src="${t.screenshot}" alt="Screenshot">
        ` : ""}

        <br><br>
        <b>Status:</b> <span class="${statusClass}">${statusText}</span>

        <form onsubmit="saveTicket(event, ${t.id})">

          <label for="status-${t.id}">Status ändern</label>
          <select id="status-${t.id}">
            <option value="open" ${t.status==="open"?"selected":""}>Offen</option>
            <option value="in_progress" ${t.status==="in_progress"?"selected":""}>In Bearbeitung</option>
            <option value="closed" ${t.status==="closed"?"selected":""}>Erledigt</option>
          </select>

          <label for="name-${t.id}">Name</label>
          <input id="name-${t.id}">

          <label for="note-${t.id}">Notiz</label>
          <textarea id="note-${t.id}"></textarea>

          <button type="submit">Speichern</button>

        </form>

        <div class="history">
          <b>Verlauf:</b><br><br>

          ${(Array.isArray(t.notes) ? t.notes : []).map(n => `
            <div class="note">
              ${n.time || ""} – <b>${n.name || ""}</b><br>
              ${n.text || ""}
            </div>
          `).join("")}

        </div>

      </div>
    `;
  });

  if(!html){
    html = "<div class='ticket'>Keine Tickets gefunden.</div>";
  }

  document.getElementById("tickets").innerHTML = html;
}

async function saveTicket(event, id){
  event.preventDefault();

  const status = document.getElementById("status-" + id).value;
  const note = document.getElementById("note-" + id).value;
  const name = document.getElementById("name-" + id).value;

  const { data } = await supabaseClient
    .from("tickets")
    .select("notes")
    .eq("id", id)
    .single();

  let notes = Array.isArray(data?.notes) ? data.notes : [];

  if(note){
    notes.push({
      text: note,
      name: name || "Support",
      time: new Date().toLocaleString()
    });
  }

  await supabaseClient
    .from("tickets")
    .update({
      status: status,
      notes: notes
    })
    .eq("id", id);

  loadTickets();
}

function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

loadTickets();
</script>

<footer style="text-align:center;margin-top:40px;color:#777;font-size:12px">
  © 2026 Luciana Bezerra – IT Support Ticket System. Alle Rechte vorbehalten.
</footer>

</body>
</html>
